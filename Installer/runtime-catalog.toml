# Runtime bundle for WebApp Launcher.
# The bundle zip is hosted on the project's GitHub Releases and contains
# runtime/, tools/, LICENSES/, and runtime-manifest.toml. The Bootstrapper
# verifies the SHA-256 checksum before extracting, mirroring the
# RuntimeUpdateManager pattern used for live updates.
#
# Bump [runtime].bundle_version in runtime-manifest.toml (and publish a
# new WAPL-Runtime-v*.zip asset) when runtime versions change.

[bundle.runtime]
type = "bundle-zip"
url = "https://github.com/hhsshoo12/WebApp_Launcher/releases/download/v0.1.0/WAPL-Runtime-v0.1.zip"
sha256 = "c4dfafef9d76a477d8b8ecc2a271b69f2156595777b495445be7ecc48e816963"
destination = "."
